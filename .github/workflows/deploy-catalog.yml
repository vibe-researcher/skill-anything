name: Deploy Catalog to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'registry.json'
      - 'published/**'
      - 'scripts/generate_catalog.py'
      - '.github/workflows/deploy-catalog.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate catalog
        run: python3 scripts/generate_catalog.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/catalog'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
